# `cargo-deny` configuration — run in CI to gate licenses, security advisories,
# and dependency hygiene. Install with `cargo install cargo-deny`, run `cargo deny check`.

[advisories]
# Fail the build on known security vulnerabilities (RUSTSEC).
version = 2
yanked = "warn"
# Add advisory IDs here only with a written justification once triaged.
ignore = []

[licenses]
version = 2
# Allowed SPDX licenses. GaussTwin itself is MIT; keep the dependency surface to
# permissive licenses unless a copyleft dependency is explicitly approved.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
# Surface duplicate versions of the same crate (a workspace-hygiene smell).
multiple-versions = "warn"
wildcard = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
