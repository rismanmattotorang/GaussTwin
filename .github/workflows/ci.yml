name: CI

# Phase 1 quality gates. Gates that pass on the current tree are BLOCKING; gates
# that still have a known backlog (full-workspace tests, clippy -D warnings) run
# in advisory mode (continue-on-error) so they are visible without making CI red,
# and are ratcheted to blocking as the backlog is cleared. See docs/PHASE0_REPORT.md
# and docs/EVALUATION_AND_ROADMAP.md.

on:
  push:
    branches: [main, gauss-twin]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # NOTE: we deliberately do NOT set `RUSTFLAGS: -D warnings` globally yet — the tree
  # still has warnings (Phase 2 cleanup). The advisory `clippy` job tracks them; the
  # blocking build/test jobs must stay green, so warnings remain non-fatal there.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----- Formatting (BLOCKING) -------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (from rust-toolchain.toml)
        run: rustup component add rustfmt
      - run: cargo fmt --all --check

  # ----- Build + blocking tests (BLOCKING) ------------------------------------
  build-test:
    name: build & test (green crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config libssl-dev libsasl2-dev protobuf-compiler
      - name: Build workspace (default features)
        run: cargo build --workspace
      # The ENTIRE workspace test suite is now green and must not regress (a few
      # tests that need external infra — live SurrealDB, FMU/RTI, a GPU adapter —
      # are #[ignore]d with reasons). agent/ai/cli have no unit tests.
      - name: Test (workspace — blocking)
        run: cargo test --workspace
      # The speculative core modules (hpc/distributed/quantum/blockchain) are opt-in
      # (Phase 2). Test them via the CPU-only `experimental` set so they stay green.
      # `gpu` is excluded (needs a real GPU adapter + heavy wgpu dep).
      - name: Test core experimental modules (blocking)
        run: cargo test -p gausstwin-core --features experimental

  # ----- Clippy (ADVISORY: ratchet to blocking once warnings are cleared) ------
  clippy:
    name: clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config libssl-dev libsasl2-dev protobuf-compiler
      - run: rustup component add clippy
      # TODO(phase1): drive warnings to zero, then add `-- -D warnings` and remove
      # continue-on-error so this becomes a blocking gate.
      - run: cargo clippy --workspace --all-targets

  # ----- Dependency policy: licenses + RUSTSEC advisories ----------------------
  # ADVISORY for now: the current dependency tree is older (axum 0.6, hyper 0.14,
  # surrealdb 1.0, tch, ...) and is expected to surface RUSTSEC advisories and
  # license-allowlist mismatches until it is triaged/modernized (roadmap Phase 2/5).
  # Ratchet to blocking (remove continue-on-error) once `cargo deny check` is clean.
  deny:
    name: cargo-deny (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  # ----- Docs build (ADVISORY) -------------------------------------------------
  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config libssl-dev libsasl2-dev protobuf-compiler
      - name: Build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --document-private-items

  # ----- Coverage baseline (ADVISORY; ratchet upward) --------------------------
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config libssl-dev libsasl2-dev protobuf-compiler
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      # Measure coverage on the green crates; expand as the test backlog clears.
      - name: Coverage (green crates)
        run: cargo llvm-cov -p gausstwin-core -p gausstwin-api --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info

  # ----- Criterion benchmarks --------------------------------------------------
  # Compiling the benches is BLOCKING (prevents benchmark rot). Running them is
  # advisory — timings on shared CI runners are noisy, so they're recorded as an
  # artifact rather than gated. Automated regression *alerting* (storing baselines
  # across runs via benchmark-action/github-action-benchmark + a gh-pages branch,
  # with an alert threshold) is the tracked follow-up.
  bench:
    name: benchmarks (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config libssl-dev libsasl2-dev protobuf-compiler
      - name: Compile benchmarks (blocking — prevents bench rot)
        run: cargo bench -p gausstwin-core --no-run
      - name: Run core benchmarks (advisory)
        continue-on-error: true
        run: cargo bench -p gausstwin-core -- --warm-up-time 1 --measurement-time 3 | tee bench-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: criterion-core
          path: |
            bench-results.txt
            target/criterion/
